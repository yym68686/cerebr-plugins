name: Check Upstream Plugins

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check:upstream -- --strict
