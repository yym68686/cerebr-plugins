<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cerebr Plugins Registry</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --line: #dbe2ea;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef7f6 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 42px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .card {
        margin-top: 28px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.06);
      }

      .link {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      .link:hover {
        text-decoration: underline;
      }

      code {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 8px;
        background: #ecfeff;
        color: #134e4a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cerebr Plugins Registry</h1>
      <p>
        This repository hosts the curated plugin registry and reviewed plugin packages used by the Cerebr marketplace.
      </p>
      <div class="card">
        <p>
          Registry file:
          <a class="link" href="./plugin-registry.json">plugin-registry.json</a>
        </p>
        <p>
          Expected marketplace URL:
          <code>https://yym68686.github.io/cerebr-plugins/plugin-registry.json</code>
        </p>
      </div>
    </main>
  </body>
  </html>
